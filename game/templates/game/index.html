<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добро пожаловать | Zeta Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: rgba(20, 20, 25, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #4CAF50;
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(76, 175, 80, 0.1) 0%, transparent 60%);
            overflow: hidden;
            flex-direction: column;
        }

        .landing-container {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8),
                        inset 0 1px 0 rgba(255,255,255,0.05);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            text-align: center;
            box-sizing: border-box;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrap {
            margin-bottom: 30px;
        }

        .logo-wrap i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(76, 175, 80, 0.4));
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #fff;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        p.subtitle {
            margin: 15px auto 40px;
            color: #aaa;
            font-size: 1.05rem;
            line-height: 1.6;
            max-width: 90%;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn i {
            color: var(--primary);
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: rgba(76, 175, 80, 0.1);
            border-color: rgba(76, 175, 80, 0.4);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .btn:hover i {
            transform: scale(1.1);
            color: #fff;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-play {
            background: var(--primary);
            color: #000;
            border: none;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .btn-play i {
            color: #000;
        }

        .btn-play:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.5);
            filter: brightness(1.1);
        }
        
        .btn-play:hover i {
            color: #000;
        }

    </style>
</head>
<body>

    <div class="landing-container">
        <div class="logo-wrap">
            <i class="fa-solid fa-satellite-dish"></i>
            <h1>Zeta Project</h1>
        </div>
        
        <p class="subtitle">
            Добро пожаловать в веб-РТС нового поколения.<br>
            Докажите свои навыки полководца в сложных тактических сражениях с искусственным интеллектом.
        </p>

        <a href="{% url 'play' %}" class="btn btn-play">
            <i class="fa-solid fa-play"></i> ИГРАТЬ
        </a>
        <a href="{% url 'login' %}" class="btn">
            <i class="fa-solid fa-fingerprint"></i> Войти в систему
        </a>
        <a href="{% url 'register' %}" class="btn">
            <i class="fa-solid fa-id-card"></i> Регистрация
        </a>
    </div>

</body>
</html>
