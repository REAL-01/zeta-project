<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration | Zeta Project</title>
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'logo.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/branding.css' %}?v=1.0.6">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrap {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-wrap i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(0, 180, 216, 0.3));
        }

        h2 {
            margin: 0;
            font-size: 1.8rem;
            color: #fff;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        p.subtitle {
            margin: 5px 0 0;
            color: #888;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .form-group {
            position: relative;
            margin-bottom: 25px;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            transition: color 0.3s;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(0, 180, 216, 0.1);
        }

        input:focus + i {
            color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.3);
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 180, 216, 0.4);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(244, 67, 54, 0.2);
        }

        .footer-links {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }

        .footer-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--primary);
        }
    </style>
</head>
<body class="scanline">

    <div class="auth-container">
        <div class="logo-wrap">
            <i class="fa-solid fa-id-card"></i>
            <h2 data-i18n="reg.title">Registration</h2>
            <p class="subtitle" data-i18n="reg.subtitle">Create New Commander Profile</p>
        </div>

        {% if error %}
        <div class="error"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <input type="text" name="username" data-i18n="reg.callsign" placeholder="Desired Callsign" required>
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <div class="form-group">
                <input type="password" name="password" data-i18n="reg.secret" placeholder="Secret Code" required>
                <i class="fa-solid fa-lock"></i>
            </div>
            <div class="form-group">
                <input type="password" name="password_confirm" data-i18n="reg.confirm" placeholder="Confirm Code" required>
                <i class="fa-solid fa-check-double"></i>
            </div>
            <button type="submit" class="btn-submit" data-i18n="reg.submit">Enlist</button>
        </form>

        <div class="footer-links">
            <span data-i18n="reg.has_profile">Already have a profile?</span> <a href="{% url 'login' %}" data-i18n="reg.signin">Sign In</a>
        </div>
    </div>

    {% include 'game/audio.html' %}
    <script src="{% static 'js/i18n.js' %}?v=1.0.6"></script>
</body>
</html>
