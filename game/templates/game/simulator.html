<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    {% load static %}
    <title>Zeta Project: WEB strategy</title>
    <link rel="icon" type="image/png" href="{% static 'logo.png' %}">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/branding.css' %}?v=1.0.6">
    
    <style>
        body {
            padding: 15px;
            box-sizing: border-box;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        
        #app {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            padding: 20px;
            position: relative;
            box-sizing: border-box;
        }
        
        #left-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 0;
            width: 100%;
        }
        
        #right-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-width: 0;
            width: 100%;
        }

        .viewport-container {
            width: 100%;
            max-width: 540px;
            aspect-ratio: 1 / 1;
            position: relative;
            background: #000;
            border: 2px solid var(--border-bright);
            box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 15px var(--primary-glow);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            image-rendering: pixelated; /* Crisp grid */
        }

        /* Enhanced Mobile Support */
        @media (max-width: 750px) {
            #app {
                display: flex !important;
                flex-direction: column !important;
                padding: 10px !important;
            }
            #right-panel { order: -1; margin-bottom: 20px; } /* Game field ON TOP */
            .viewport-container {
                max-width: 95vw !important;
                width: 95vw !important;
            }
        }

        h2 {
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 1.25rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-card {
            padding: 20px;
            text-align: center;
            position: relative;
        }
        
        .rank-display {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 110px;
        }
        
        .rank-display img {
            height: 100px;
            filter: drop-shadow(0 0 10px var(--primary-glow));
            transition: var(--transition);
        }
        
        .xp-container {
            margin-top: 15px;
        }

        .stats-card {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { font-weight: bold; font-size: 1rem; }

        #game-messages {
            height: 180px;
            padding: 12px;
            font-size: 0.8rem;
            overflow-y: auto;
            border-left: 2px solid var(--primary-glow);
            background: rgba(0,0,0,0.2);
        }
        
        #turn-indicator {
            width: 100%;
            text-align: center;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: rgba(0, 180, 216, 0.1);
            border: 1px solid var(--primary-glow);
            color: var(--primary);
            font-family: var(--font-heading);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .enemy-turn {
            background: rgba(239, 71, 111, 0.1) !important;
            border-color: rgba(239, 71, 111, 0.3) !important;
            color: var(--danger) !important;
        }

        /* Modal & UI Overhaul */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease-out;
        }

        .modal-content {
            background: var(--surface-bright);
            border: 1px solid var(--border-bright);
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px var(--primary-glow);
            border-radius: 16px;
            padding: 30px;
            max-width: 90vw;
            position: relative;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-content.wide { width: 95vw !important; max-width: 1100px; }

        .modal-list-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 12px;
            transition: var(--transition);
        }

        .modal-list-item:hover {
            background: rgba(0, 180, 216, 0.08);
            border-color: var(--primary-glow);
            transform: translateX(5px);
        }

        .icon-circle {
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: #111;
            border: 1px solid var(--border-bright);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .btn-hire {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 10px var(--primary-glow);
        }

        .btn-hire:disabled {
            background: #444;
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Tech Tree Specifics */
        .tech-tree-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 5px;
        }

        .tech-column {
            flex: 1 1 0;
            min-width: 140px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tech-col-title {
            font-family: var(--font-heading);
            font-weight: bold;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 5px;
        }

        .tech-node {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .tech-node:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .tech-node.ready {
            border-color: var(--primary-glow);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .tech-node.researched {
            border-color: var(--success);
            background: rgba(6, 214, 160, 0.05);
        }

        .tech-node.researched::after {
            content: '✓';
            position: absolute;
            top: 5px; right: 10px;
            color: var(--success);
            font-weight: bold;
        }

        .tech-node.locked {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .tech-node.locked:hover {
            transform: none;
            background: rgba(255, 255, 255, 0.05);
        }
        
        @media (max-width: 600px) {
            .tech-tree-container {
                flex-direction: column;
                overflow-x: hidden;
            }
            .tech-column {
                flex: 1;
            }
        }
    </style>
</head>
<body class="scanline">
    <div id="app" class="glass">
        <div id="left-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 5px;">

                    <img src="{% static 'logo.png' %}" alt="Logo" style="height: 30px;">
                    <div style="display:flex; flex-direction: column;">
                        <span style="font-weight:bold; font-size: 0.9rem; letter-spacing: 1px;">ZETA PROJECT</span>
                        <span style="font-size: 0.5rem; color: var(--text-muted);">v0.0.4 • SHIELD v1.0.3</span>
                    </div>
                </div>
                <div style="display:flex; gap: 15px; align-items:center;">
                    {% if not is_guest %}
                    <form action="{% url 'logout' %}" method="POST">{% csrf_token %}<button type="submit" style="background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:0.7rem;"><i class="fa-solid fa-power-off"></i></button></form>
                    {% endif %}
                </div>
            </div>
            
            <div class="profile-card glass-bright animate-pulse">
                <div class="rank-display">
                    <img id="player-rank-icon" src="/static/rank_icons/1_private.png" alt="Rank">
                </div>
                <div style="font-weight: 700; font-size: 1.1rem; color: #fff; margin-bottom: 2px;">{{ username }}</div>
                <div class="rank-name" id="player-rank" style="font-size: 0.9rem; margin-bottom: 15px;">Private</div>
                
                <div class="xp-container">
                    <div style="display:flex; justify-content:space-between; font-size:0.6rem; color:var(--text-muted); margin-bottom:5px;">
                        <span id="lbl-level-progression">LEVEL PROGRESSION</span> 
                        <strong><span id="player-xp">0</span> / <span id="next-rank-xp">100</span></strong>
                    </div>
                    <div class="xp-bar-bg">
                        <div class="xp-bar-fill" id="xp-bar-fill" style="width:0%; background: linear-gradient(90deg, var(--secondary), var(--primary)); height:100%;"></div>
                    </div>
                </div>
            </div>

            <div class="stats-card glass-bright">
                <div class="stat-item" style="color: var(--success)">
                    <i class="fa-solid fa-person-military-pointing"></i>
                    <div class="stat-label">Units</div>
                    <div class="stat-value" id="unit-cap-cnt">0/3</div>
                </div>
                <div class="stat-item" style="color: var(--accent)">
                    <i class="fa-solid fa-microchip"></i>
                    <div class="stat-label">Science</div>
                    <div class="stat-value" id="lightbulbs-cnt">0</div>
                </div>
                <div class="stat-item" style="color: var(--primary)">
                    <i class="fa-solid fa-coins"></i>
                    <div class="stat-label">Gold</div>
                    <div class="stat-value" id="gold-cnt">0</div>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button id="hire-btn" class="btn-premium btn-primary-action"><i class="fa-solid fa-plus"></i> <span data-i18n="sim.deploy_units">Deploy Base Units</span></button>
                <button id="research-btn" class="btn-premium" style="--primary: #9C27B0; --primary-glow: rgba(156, 39, 176, 0.2);"><i class="fa-solid fa-flask"></i> <span data-i18n="sim.tech_lab">Tech Laboratory</span></button>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
                    <button id="end-turn-btn" class="btn-premium" style="--primary: var(--success); --primary-glow: rgba(6, 214, 160, 0.2);"><i class="fa-solid fa-forward"></i> <span data-i18n="sim.turn">Turn</span></button>
                    <button id="new-battle-btn" class="btn-premium" style="--primary: #666; --primary-glow: rgba(100, 100, 100, 0.2);"><i class="fa-solid fa-rotate"></i> <span data-i18n="sim.reset">Reset</span></button>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <a href="{% url 'lobby' %}" class="btn-premium" style="font-size: 0.7rem;"><i class="fa-solid fa-house"></i> <span data-i18n="sim.lobby">Lobby</span></a>
                    <a href="{% url 'profile' %}" class="btn-premium" style="font-size: 0.7rem;"><i class="fa-solid fa-user-gear"></i> <span data-i18n="sim.profile">Profile</span></a>
                </div>
            </div>
            
            <div id="game-messages" class="glass-bright">
                <div id="messages-content"></div>
            </div>
        </div>
        
        <div id="right-panel">
            <div id="turn-indicator">Initialization...</div>
            <div class="viewport-container">
                <canvas id="game-canvas" width="540" height="540"></canvas>
            </div>
        </div>
    </div>
    
    
    <div id="modal-container" class="modal-overlay">
       <div class="modal-content" style="width: 480px;">
           <h3 id="modal-title" style="margin-top:0; color:var(--primary); border-bottom: 1px solid var(--border); padding-bottom:15px; font-family:var(--font-heading); text-transform:uppercase; letter-spacing:2px;" data-i18n="sim.menu">Menu</h3>
           <div id="modal-body" style="margin-bottom: 25px; max-height: 70vh; overflow-y:auto; overflow-x: hidden;">
           </div>
           <div style="text-align: right;">
               <button onclick="closeModal()" class="btn-premium" style="--primary: #999; padding: 8px 20px;"><i class="fa-solid fa-xmark"></i> <span data-i18n="sim.close">Close</span></button>
           </div>
       </div>
    </div>

        // Anti-cheat v1: Protected internal state

        let playerGold = _ZETA.g;

        let units = [];
        let sessionKillsToSave = 0;

        let _lastGameVersion = -1;
        let _waitingForTurnAck = false;
        let _gameOverProcessed = false;

        function updateTurnIndicator() {
            const ind = document.getElementById('turn-indicator');
            const hireBtn = document.getElementById('hire-btn');
            const researchBtn = document.getElementById('research-btn');
            const endTurnBtn = document.getElementById('end-turn-btn');

            if (GAME_MODE !== 'multiplayer') { 
                if(ind) {
                    ind.style.display = 'block'; 
                    ind.innerHTML = '<i class="fa-solid fa-crosshairs"></i> ' + t('sim.tactical_mode');
                    ind.className = '';
                }
                return; 
            }
            
            if (isMyTurnMp) {
                if(ind) {
                    ind.className = '';
                    ind.innerHTML = '<i class="fa-solid fa-check"></i> ' + t('sim.your_turn');
                }
                if(hireBtn) hireBtn.disabled = false;
                if(researchBtn) researchBtn.disabled = false;
                if(endTurnBtn) endTurnBtn.disabled = false;
            } else {
                if(ind) {
                    ind.className = 'enemy-turn';
                    ind.innerHTML = '<i class="fa-solid fa-hourglass-half fa-spin"></i> ' + t('sim.opponent_turn');
                }
                if(hireBtn) hireBtn.disabled = true;
                if(researchBtn) researchBtn.disabled = true;
                if(endTurnBtn) endTurnBtn.disabled = true;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Event Listeners for new UI
            document.getElementById('hire-btn')?.addEventListener('click', () => openModal('hire'));
            document.getElementById('research-btn')?.addEventListener('click', () => openModal('research'));
            document.getElementById('new-battle-btn')?.addEventListener('click', startBattle);
            document.getElementById('end-turn-btn')?.addEventListener('click', () => {
                if (gameState !== 'playing' || turn !== 'player') return;

                logMessage(t('sim.turn_ended'), 'msg-sys');
                selectedUnit = null;
                draw();

                if (GAME_MODE === 'multiplayer') {
                    turn = 'wait';
                    isMyTurnMp = false;
                    _waitingForTurnAck = true;
                    updateTurnIndicator();
                    mpSendState(false); // false = NOT finished, just end of turn
                } else {
                    turn = 'ai';
                    setTimeout(aiTurn, 500);
                }
            });
            
            loadGame();
            updateUI(); 
            startBattle();
            document.fonts.ready.then(() => { draw(); });
        });

        function getPlayerMaxUnits() {
            let max = 3;
            if (hasTech('cap1')) max += 1;
            if (hasTech('cap2')) max += 2;
            if (hasTech('cap3')) max += 3;
            return max;
        }

        function getCurrentUnitCap(faction) {
            return units.filter(u => u.type === faction && u.uClass !== 'hq').length;
        }

        setInterval(() => {
            if (gameState === 'playing') {
                // In MP, both players get income constantly (real-time strategy feel)
                let baseIncome = 3;
                if (hasTech('eco1')) baseIncome += 1;
                if (hasTech('eco3')) baseIncome += 2;
                if (hasTech('eco4')) baseIncome += 3;
                if (currentRankIdx >= 10) baseIncome += 1;
                playerGold += baseIncome;
                _ZETA.g = playerGold;
                
                // AI income (only in single player)
                if (GAME_MODE !== 'multiplayer') {
                    let aiIncome = 4;
                    if (currentRankIdx >= 2) aiIncome += 2;
                    if (currentRankIdx >= 5) aiIncome += 2;
                    if (currentRankIdx >= 10) aiIncome += 3;
                    if (currentRankIdx >= 14) aiIncome += 3;
                    aiGold += aiIncome;
                }

                updateUI();
            }
        }, 1000);

        // Removed loosely attached calls - now handled in DOMContentLoaded

        function logMessage(text, colorClass = '') {
            const mc = document.getElementById('messages-content');
            const div = document.createElement('div');
            div.className = `msg ${colorClass}`;
            div.textContent = text;
            mc.appendChild(div);
            const container = document.getElementById('game-messages');
            container.scrollTop = container.scrollHeight;
        }

        function saveGame(ended = false, won = false) {
            const data = { 
                xp: playerXp, 
                rankIdx: currentRankIdx, 
                bulbs: lightbulbs, 
                techs: researchedTechs.join(','),
                gold: playerGold,
                ended: ended,
                won: won,
                enemies_killed: sessionKillsToSave,
                match_id: "{{ match_id }}"
            };
            sessionKillsToSave = 0;
            fetch('/api/save/', {
                method: 'POST',
                keepalive: true,
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify(data)
            });
        }

        function loadGame() {
            TECH_TREE['eco1'].researched = hasTech('eco1');
            TECH_TREE['eco2'].researched = hasTech('eco2');
            TECH_TREE['eco3'].researched = hasTech('eco3');
            TECH_TREE['eco4'].researched = hasTech('eco4');
            TECH_TREE['cap1'].researched = hasTech('cap1');
            TECH_TREE['cap2'].researched = hasTech('cap2');
            TECH_TREE['cap3'].researched = hasTech('cap3');
            TECH_TREE['inf_hp1'].researched = hasTech('inf_hp1');
            TECH_TREE['inf_dmg1'].researched = hasTech('inf_dmg1');
            TECH_TREE['inf_hp2'].researched = hasTech('inf_hp2');
            TECH_TREE['inf_rng'].researched = hasTech('inf_rng');
            TECH_TREE['tnk_dmg1'].researched = hasTech('tnk_dmg1');
            TECH_TREE['tnk_hp1'].researched = hasTech('tnk_hp1');
            TECH_TREE['tnk_dmg2'].researched = hasTech('tnk_dmg2');
            TECH_TREE['tnk_hp2'].researched = hasTech('tnk_hp2');
            TECH_TREE['art_dmg1'].researched = hasTech('art_dmg1');
            TECH_TREE['art_rng1'].researched = hasTech('art_rng1');
            TECH_TREE['art_dmg2'].researched = hasTech('art_dmg2');
            TECH_TREE['art_mgr'].researched = hasTech('art_mgr');
            TECH_TREE['air_dmg1'].researched = hasTech('air_dmg1');
            TECH_TREE['air_hp1'].researched = hasTech('air_hp1');
            TECH_TREE['air_dmg2'].researched = hasTech('air_dmg2');
            TECH_TREE['air_rng1'].researched = hasTech('air_rng1');
        }

        function updateUI() {
            let nextRankXpText = t('sim.max');
            let progressPercent = 100;
            if (currentRankIdx < ranks.length - 1) {
                let currentRankXp = ranks[currentRankIdx].xp;
                let nextRankXp = ranks[currentRankIdx + 1].xp;
                nextRankXpText = nextRankXp;
                let needed = nextRankXp - currentRankXp;
                let earned = playerXp - currentRankXp;
                progressPercent = Math.min(100, Math.max(0, (earned / needed) * 100));
            }
            let xpBarFill = document.getElementById('xp-bar-fill');
            if(xpBarFill) xpBarFill.style.width = progressPercent + '%';
            if(document.getElementById('player-rank')) document.getElementById('player-rank').textContent = t('rank.' + currentRankIdx);
            let iconEl = document.getElementById('player-rank-icon');
            if (iconEl && ranks[currentRankIdx].icon) iconEl.src = '/static/rank_icons/' + ranks[currentRankIdx].icon;
            if(document.getElementById('player-xp')) document.getElementById('player-xp').textContent = playerXp;
            if(document.getElementById('next-rank-xp')) document.getElementById('next-rank-xp').textContent = nextRankXpText;
            if(document.getElementById('lightbulbs-cnt')) document.getElementById('lightbulbs-cnt').textContent = lightbulbs;
            if(document.getElementById('gold-cnt')) document.getElementById('gold-cnt').textContent = playerGold;
            let p_cur = getCurrentUnitCap('player');
            let p_max = getPlayerMaxUnits();
            const capEl = document.getElementById('unit-cap-cnt');
            if(capEl) capEl.textContent = `${p_cur} / ${p_max}`;
        }

        function addXp(amount) {
            playerXp += amount;
            let leveledUp = false;
            while (currentRankIdx < ranks.length - 1 && playerXp >= ranks[currentRankIdx + 1].xp) {
                currentRankIdx++;
                leveledUp = true;
            }
            // пахуи
            if (leveledUp) logMessage(`${t('sim.new_rank')} ${t('rank.' + currentRankIdx)}!`, 'msg-sys');
            _ZETA.x = playerXp;
            _ZETA.r = currentRankIdx;
            updateUI();
        }

        function hasTech(id) { return researchedTechs.includes(id); }

        function getUnitStats(type, faction) {
            let hp = UNIT_TYPES[type].hp;
            let dmg = [...UNIT_TYPES[type].dmg];
            let move = UNIT_TYPES[type].move;
            let range = UNIT_TYPES[type].range;
            if (faction === 'player') {
                if (type === 'infantry' && hasTech('inf_hp1')) hp += 5;
                if (type === 'infantry' && hasTech('inf_hp2')) hp += 10;
                if (type === 'infantry' && hasTech('inf_dmg1')) { dmg[0]+=3; dmg[1]+=3; }
                if (type === 'infantry' && hasTech('inf_rng')) range += 1;
                if (type === 'tank' && hasTech('tnk_dmg1')) { dmg[0]+=3; dmg[1]+=3; }
                if (type === 'tank' && hasTech('tnk_hp1')) hp += 15;
                if (type === 'tank' && hasTech('tnk_dmg2')) { dmg[0]+=5; dmg[1]+=5; }
                if (type === 'tank' && hasTech('tnk_hp2')) hp += 25;
                if (type === 'artillery' && hasTech('art_dmg1')) { dmg[0]+=5; dmg[1]+=5; }
                if (type === 'artillery' && hasTech('art_rng1')) range += 1;
                if (type === 'artillery' && hasTech('art_dmg2')) { dmg[0]+=8; dmg[1]+=8; }
                if (type === 'artillery' && hasTech('art_mgr')) move += 1;
                if (type === 'air' && hasTech('air_dmg1')) { dmg[0]+=4; dmg[1]+=4; }
                // пахууй
                if (type === 'air' && hasTech('air_hp1')) hp += 10;
                // похуй
                if (type === 'air' && hasTech('air_dmg2')) { dmg[0]+=7; dmg[1]+=7; }
                if (type === 'air' && hasTech('air_rng1')) move += 1;
            } else if (faction === 'enemy') {
                if (currentRankIdx >= 10 && type !== 'hq') {
                    hp = Math.floor(hp * 1.1);
                    dmg[0] = Math.ceil(dmg[0] * 1.1);
                    dmg[1] = Math.ceil(dmg[1] * 1.1);
                }
            }
            return { hp: hp, maxHp: hp, dmg: dmg, move: move, range: range };
        }

        function spawnUnit(faction, uType) {
            let syStart = faction === 'player' ? 8 : 0;
            let syEnd = faction === 'player' ? 7 : 1;
            let step = faction === 'player' ? -1 : 1;
            let spawnCords = null;
            let y = syStart;
            while(true) {
                // похй
                for(let x=0; x<GRID_SIZE; x++) {
                    if (!getUnitAt(x, y)) { spawnCords = {x, y}; break; }
                }
                if (spawnCords || y === syEnd) break;
                y += step;
            }
            if (spawnCords) {
                if(window.playSpawnSound) window.playSpawnSound();
                let stats = getUnitStats(uType, faction);
                units.push({ type: faction, uClass: uType, x: spawnCords.x, y: spawnCords.y, hp: stats.hp, maxHp: stats.maxHp, damage: stats.dmg, moveRange: stats.move, attackRange: stats.range, hasMoved: faction === 'player' ? (turn !== 'player') : false, hasAttacked: faction === 'player' ? (turn !== 'player') : false });
                return true;
            }
            return false;
        }

        function startBattle() {
            if(window.playStartSound) window.playStartSound();
            units = [];
            _gameOverProcessed = false;
            
            playerGold = 50 + (hasTech('eco2') ? 50 : 0);
            aiGold = 50; 
            if (GAME_MODE === 'multiplayer') {
                // Both host and guest create HQs locally so field is visible immediately
                units.push({ type: 'player', uClass: 'hq', x: 4, y: 8, hp: 100, maxHp: 100, damage: [0,0], moveRange: 0, attackRange: 0, hasMoved: true, hasAttacked: true });
                units.push({ type: 'enemy', uClass: 'hq', x: 4, y: 0, hp: 100, maxHp: 100, damage: [0,0], moveRange: 0, attackRange: 0, hasMoved: true, hasAttacked: true });
                gameState = 'playing';
                
                if (GAME_ROLE === 'host') {
                    turn = 'player';
                    isMyTurnMp = true;
                    updateTurnIndicator();
                    // Send initial state so server has data for guest
                    mpSendState(false, true);
                    mpStartPolling();
                } else {
                    turn = 'wait';
                    isMyTurnMp = false;
                    updateTurnIndicator();
                    mpStartPolling();
                }
            } else {
                units.push({ type: 'player', uClass: 'hq', x: 4, y: 8, hp: 100, maxHp: 100, damage: [0,0], moveRange: 0, attackRange: 0, hasMoved: true, hasAttacked: true });
                units.push({ type: 'enemy', uClass: 'hq', x: 4, y: 0, hp: 100, maxHp: 100, damage: [0,0], moveRange: 0, attackRange: 0, hasMoved: true, hasAttacked: true });
                aiGold = 50 + (currentRankIdx * 10);
                
                let aiComp = ['infantry', 'infantry', 'tank'];
                if (currentRankIdx >= 2) aiComp = ['infantry', 'tank', 'artillery'];
                if (currentRankIdx >= 6) aiComp = ['tank', 'artillery', 'air'];
                if (currentRankIdx >= 12) aiComp = ['tank', 'air', 'artillery'];
                
                aiComp.forEach(t => { if (spawnUnit('enemy', t)) aiGold -= UNIT_TYPES[t].cost; });
                turn = 'player';
                gameState = 'playing';
                updateTurnIndicator();
            }

            selectedUnit = null;
            document.getElementById('messages-content').innerHTML = '';
            logMessage(t('sim.battle_started'), 'msg-sys');
            updateUI();
            draw();
        }

        function getUnitAt(x, y) { return units.find(u => u.x === x && u.y === y); }

        window.openModal = function(type) {
            const container = document.getElementById('modal-container');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            const contentContainer = document.querySelector('.modal-content');
            body.innerHTML = '';
            
            if (type === 'hire') {
                contentContainer.classList.remove('wide');
                title.innerHTML = '<i class="fa-solid fa-person-military-rifle"></i> ' + t('sim.hire_title');
                let cur = getCurrentUnitCap('player');
                let max = getPlayerMaxUnits();
                
                ['infantry', 'tank', 'artillery', 'air'].forEach(uKey => {
                    const data = UNIT_TYPES[uKey];
                    const stats = getUnitStats(uKey, 'player');
                    const canAfford = playerGold >= data.cost;
                    const unitName = t('unit.' + (uKey === 'air' ? 'air' : uKey));
                    
                    const div = document.createElement('div');
                    div.className = 'modal-list-item';
                    div.innerHTML = `
                        <div class="icon-circle" style="background:#222; color:${data.color};">${data.iconHtml}</div>
                        <div style="flex-grow:1; margin-left: 10px;"><b>${unitName}</b><br><small style="color:#aaa;">${t('sim.dmg')}: ${stats.dmg.join('-')} | HP: ${stats.maxHp}</small></div>
                        <button class="btn-hire" ${!canAfford || cur >= max ? 'disabled' : ''} onclick="buyUnit('${uKey}')">${t('sim.recruit')} <span style="font-size:0.85em; color:var(--primary);"><i class="fa-solid fa-cubes"></i> ${data.cost}</span></button>
                    `;
                    body.appendChild(div);
                });
            } else if (type === 'tech' || type === 'research') {
                contentContainer.classList.add('wide');
                title.innerHTML = '<i class="fa-solid fa-microchip"></i> ' + t('sim.tech_title');
                const COLS = [
                    { id: 'gold', title: '<i class="fa-solid fa-cubes"></i> ' + t('tech.col.supply'), nodes: ['eco1', 'eco2', 'eco3', 'eco4'] },
                    { id: 'command', title: '<i class="fa-solid fa-building-circle-arrow-right"></i> ' + t('tech.col.structure'), nodes: ['cap1', 'cap2', 'cap3'] },
                    { id: 'infantry', title: '<i class="fa-solid fa-person-rifle"></i> ' + t('tech.col.infantry'), nodes: ['inf_hp1', 'inf_dmg1', 'inf_hp2', 'inf_rng'] },
                    { id: 'tanks', title: '<div style="display:inline-block; width:22px; vertical-align:middle; position:relative; top:-2px; color:inherit;">' + UNIT_TYPES['tank'].iconHtml + '</div> ' + t('tech.col.tanks'), nodes: ['tnk_dmg1', 'tnk_hp1', 'tnk_dmg2', 'tnk_hp2'] },
                    { id: 'artillery', title: '<i class="fa-solid fa-crosshairs"></i> ' + t('tech.col.artillery'), nodes: ['art_dmg1', 'art_rng1', 'art_dmg2', 'art_mgr'] },
                    { id: 'air', title: '<i class="fa-solid fa-plane-up"></i> ' + t('tech.col.air'), nodes: ['air_dmg1', 'air_hp1', 'air_dmg2', 'air_rng1'] }
                ];
                
                let html = '<div class="tech-tree-container">';
                COLS.forEach(col => {
                    html += `<div class="tech-column"><div class="tech-col-title">${col.title}</div>`;
                    col.nodes.forEach(nodeId => {
                        const tech = TECH_TREE[nodeId];
                        let stateClass = 'locked';
                        if (tech.researched) stateClass = 'researched';
                        else if (tech.req.length === 0 || tech.req.every(r => TECH_TREE[r].researched)) stateClass = 'ready';
                        
                        html += `
                            <div class="tech-node ${stateClass}" onclick="buyTech('${nodeId}')">
                                <div style="font-weight:bold; font-size:1.05rem; margin-bottom:5px;">${t('tech.' + nodeId)}</div>
                                <div style="font-size:0.75rem; color:#aaa; margin-bottom:8px;">${t('tech.' + nodeId + '.d')}</div>
                                <div style="color:#ffeb3b; font-weight:bold; font-size:0.9rem;"><i class="fa-solid fa-flask"></i> ${tech.cost}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                });
                html += '</div>';
                body.innerHTML = html;
            }
            container.style.display = 'flex';
        }

        window.closeModal = function() {
            document.getElementById('modal-container').style.display = 'none';
        }

        window.buyUnit = function(uType) {
            if (turn !== 'player' || gameState !== 'playing') {
                logMessage(window.t('sim.no_recruit_enemy_turn'), "msg-dmg");
                if(window.playErrorSound) window.playErrorSound();
                return;
            }
            let cost = UNIT_TYPES[uType].cost;
            if (playerGold >= cost && getCurrentUnitCap('player') < getPlayerMaxUnits()) {
                if (spawnUnit('player', uType)) {
                    playerGold -= cost;
                    _ZETA.g = playerGold;
                    updateUI();
                    draw();
                    openModal('hire');
                }
            } else {
                if(window.playErrorSound) window.playErrorSound();
            }
        }

        window.buyTech = function(id) {
            if (turn !== 'player' || gameState !== 'playing') {
                logMessage(t('sim.no_tech_enemy_turn'), "msg-dmg");
                if(window.playErrorSound) window.playErrorSound();
                return;
            }
            let tech = TECH_TREE[id];
            if (!tech.researched && lightbulbs >= tech.cost && (tech.req.length === 0 || tech.req.every(r => TECH_TREE[r].researched))) {
                lightbulbs -= tech.cost;
                _ZETA.l = lightbulbs;
                tech.researched = true;
                researchedTechs.push(id);
                updateUI();
                openModal('tech');
                
                units.forEach(u => {
                    if (u.type === 'player' && u.uClass !== 'hq') {
                        let newStats = getUnitStats(u.uClass, 'player');
                        if (u.maxHp < newStats.maxHp) {
                            let diff = newStats.maxHp - u.maxHp;
                            u.maxHp = newStats.maxHp;
                            u.hp += diff;
                        }
                        u.damage = newStats.dmg;
                        u.moveRange = newStats.move;
                        u.attackRange = newStats.range;
                    }
                });
                draw();
            } else if (!tech.researched) {
                if(window.playErrorSound) window.playErrorSound();
            }
        }

        canvas.addEventListener('click', (e) => {
            if (gameState !== 'playing' || turn !== 'player') return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const x = Math.floor(((e.clientX - rect.left) * scaleX) / CELL_SIZE);
            const y = Math.floor(((e.clientY - rect.top) * scaleY) / CELL_SIZE);
            const clickedUnit = getUnitAt(x, y);
            
            if (clickedUnit && clickedUnit.type === 'player') {
                selectedUnit = clickedUnit;
                draw();
                return;
            }
            
            if (selectedUnit && !clickedUnit) {
                let dist = Math.max(Math.abs(x - selectedUnit.x), Math.abs(y - selectedUnit.y));
                if (dist <= selectedUnit.moveRange && !selectedUnit.hasMoved && !selectedUnit.hasAttacked) {
                    selectedUnit.x = x; selectedUnit.y = y; selectedUnit.hasMoved = true;
                    draw();
                }
            } else if (selectedUnit && clickedUnit && clickedUnit.type === 'enemy') {
                let dist = Math.max(Math.abs(x - selectedUnit.x), Math.abs(y - selectedUnit.y));
                if (dist <= selectedUnit.attackRange && !selectedUnit.hasAttacked) {
                    if(window.playAttackSound) window.playAttackSound();
                    let dmg = Math.floor(Math.random()*(selectedUnit.damage[1]-selectedUnit.damage[0]+1)) + selectedUnit.damage[0];
                    clickedUnit.hp -= dmg;
                    selectedUnit.hasAttacked = true;
                    selectedUnit.hasMoved = true; // Запрещаем движение после атаки
                    checkDeaths();
                    draw();
                }
            }
        });

        function checkDeaths() {
            let died = false;
            // пахую
            for (let i = units.length - 1; i >= 0; i--) {
                if (units[i].hp <= 0) {
                    let u = units[i];
                    if (u.type === 'enemy') {
                        sessionKillsToSave++;
                        logMessage(`${t('unit.' + (u.uClass === 'air' ? 'air' : u.uClass))} ${t('sim.enemy_destroyed')}`, 'msg-dmg');
                        if (u.uClass !== 'hq') {
                            let bulbs = Math.floor(Math.random() * 3) + 1;
                            lightbulbs += bulbs;
                            logMessage(`Собрано ${bulbs} 💡`, 'msg-sys');
                            if (u.uClass === 'tank' || u.uClass === 'air') addXp(10);
                            else addXp(5);
                        }
                    } else {
                        logMessage(`${t('unit.' + (u.uClass === 'air' ? 'air' : u.uClass))} ${t('sim.unit_fallen')}`, 'msg-dmg');
                    }
                    if (u === selectedUnit) selectedUnit = null;
                    if(window.playDeathSound) window.playDeathSound();
                    units.splice(i, 1);
                    died = true;
                }
            }
            let p_hq = units.filter(u => u.type === 'player' && u.uClass === 'hq');
            let e_hq = units.filter(u => u.type === 'enemy' && u.uClass === 'hq');
            if (p_hq.length === 0) {
                gameState = 'lost'; 
                logMessage(t('sim.defeat_hq'), 'msg-dmg'); 
                saveGame(true, false); 
                draw(); 
                if (GAME_MODE === 'multiplayer') mpSendState(true);
                setTimeout(() => alert(t('sim.defeat')), 100); 
                return true;
            }
            if (e_hq.length === 0) {
                gameState = 'won'; 
                logMessage(t('sim.victory_hq'), 'msg-heal'); 
                addXp(100); 
                saveGame(true, true); 
                draw(); 
                if (GAME_MODE === 'multiplayer') mpSendState(true);
                setTimeout(() => alert(t('sim.victory')), 100);
                return true;
            }
            updateUI();
            return died;
        }

        function aiTurn() {
            if (gameState !== 'playing') return;
            
            let attempts = 0;
            let currentAiCap = getCurrentUnitCap('enemy');
            let aiMaxCap = 3 + Math.floor(currentRankIdx / 3);
            if (aiMaxCap > 9) aiMaxCap = 9;
            let aiInf = units.filter(u => u.type === 'enemy' && u.uClass === 'infantry').length;
            let aiTnk = units.filter(u => u.type === 'enemy' && u.uClass === 'tank').length;
            let aiArt = units.filter(u => u.type === 'enemy' && u.uClass === 'artillery').length;
            let aiAir = units.filter(u => u.type === 'enemy' && u.uClass === 'air').length;

            while(attempts < 15 && currentAiCap < aiMaxCap) {
                let pick = null;
                // Strategic AI Recruitment Logic
                if (aiGold >= 30 && aiArt === 0) pick = 'artillery';
                else if (aiGold >= 40 && aiTnk === 0) pick = 'tank';
                else if (aiGold >= 40 && aiTnk < aiInf) pick = 'tank';
                else if (aiGold >= 40 && aiTnk < 3) pick = 'tank';
                else if (aiGold >= 30 && aiArt < 2) pick = 'artillery';
                else if (aiGold >= 50 && aiAir < 2) pick = 'air';
                else if (aiGold >= 15) pick = 'infantry';
                
                if (pick && spawnUnit('enemy', pick)) {
                    aiGold -= UNIT_TYPES[pick].cost;
                    currentAiCap++;
                    if (pick === 'infantry') aiInf++;
                    else if (pick === 'tank') aiTnk++;
                    else if (pick === 'artillery') aiArt++;
                    else if (pick === 'air') aiAir++;
                } else {
                    break;
                }
                attempts++;
            }

            let enemies = units.filter(u => u.type === 'enemy');
            let players = units.filter(u => u.type === 'player'); 
            
            enemies.forEach(enemy => {
                if (enemy.hp <= 0 || enemy.uClass === 'hq') return;
                let closest = null; let minDist = Infinity;
                players.forEach(p => {
                    if (p.hp <= 0) return;
                    let dist = Math.max(Math.abs(p.x - enemy.x), Math.abs(p.y - enemy.y));
                    if (dist < minDist) { minDist = dist; closest = p; }
                });
                if (!closest) return;
                
                if (minDist <= enemy.attackRange) {
                    let dmg = Math.floor(Math.random()*(enemy.damage[1]-enemy.damage[0]+1)) + enemy.damage[0];
                    closest.hp -= dmg;
                    logMessage(`${t('unit.' + (enemy.uClass === 'air' ? 'air' : enemy.uClass))} ${t('sim.enemy_dealt')} ${dmg} ${t('sim.damage')}`, 'msg-dmg');
                } else {
                    let bestX = enemy.x; let bestY = enemy.y; let bestDist = minDist;
                    let mr = enemy.moveRange;
                    for(let dy=-mr; dy<=mr; dy++) {
                        for(let dx=-mr; dx<=mr; dx++) {
                            // пхуй
                            if (dx===0 && dy===0) continue;
                            let nx = enemy.x + dx; let ny = enemy.y + dy;
                            if (nx>=0 && nx<GRID_SIZE && ny>=0 && ny<GRID_SIZE) {
                                let moveDist = Math.max(Math.abs(dx), Math.abs(dy));
                                if (!getUnitAt(nx, ny) && moveDist <= mr) {
                                    let distToPl = Math.max(Math.abs(closest.x - nx), Math.abs(closest.y - ny));
                                    if (distToPl < bestDist) { bestDist = distToPl; bestX = nx; bestY = ny; }
                                }
                            }
                        }
                    }
                    if (bestX !== enemy.x || bestY !== enemy.y) { enemy.x = bestX; enemy.y = bestY; }
                    let newDist = Math.max(Math.abs(closest.x - enemy.x), Math.abs(closest.y - enemy.y));
                    if (newDist <= enemy.attackRange) {
                        let dmg = Math.floor(Math.random()*(enemy.damage[1]-enemy.damage[0]+1)) + enemy.damage[0];
                        closest.hp -= dmg;
                        logMessage(`${t('unit.' + (enemy.uClass === 'air' ? 'air' : enemy.uClass))} ${t('sim.advanced_attacked')} (-${dmg} HP)`, 'msg-dmg');
                    }
                }
            });
            
            checkDeaths();
            if (gameState === 'playing') {
                turn = 'player';
                units.forEach(u => { u.hasMoved = false; u.hasAttacked = false; });
                logMessage(t('sim.all_units_ready'), 'msg-sys');
                selectedUnit = null;
                draw();
            }
        }

        async function mpSendState(finished = false, initial = false) {
            if (GAME_MODE !== 'multiplayer' || !ROOM_ID) return;
            
            let exportUnits = units.map(u => {
                let sendingX = GRID_SIZE - 1 - u.x;
                let sendingY = GRID_SIZE - 1 - u.y;
                let sendingType = (u.type === 'player') ? 'enemy' : 'player';
                return { ...u, x: sendingX, y: sendingY, type: sendingType };
            });

            let sendingData = {
                units: exportUnits,
                aiGold_for_opponent: playerGold,
                playerGold_for_opponent: aiGold,
            };

            try {
                const resp = await fetch(`/api/mp/sync/${ROOM_ID}/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                    body: JSON.stringify({ game_data: JSON.stringify(sendingData), finished: finished, initial: initial })
                });
                const result = await resp.json();
                if (result.game_version !== undefined) {
                    _lastGameVersion = result.game_version;
                }
            } catch(e) {
                console.error('mpSendState error:', e);
                // Retry once after 2s on failure (except initial pushes)
                if (!initial && !finished) {
                    setTimeout(() => mpSendState(finished, initial), 2000);
                }
            }
        }

        function mpStartPolling() {
            if (GAME_MODE !== 'multiplayer') return;
            if (mpSyncInterval) clearInterval(mpSyncInterval);
            
            mpSyncInterval = setInterval(() => {
                fetch(`/api/mp/sync/${ROOM_ID}/`)
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') return;
                    
                    // Host waiting for guest to join
                    if (data.room_status === 'waiting' && GAME_ROLE === 'host') {
                        let ind = document.getElementById('turn-indicator');
                        if (ind) {
                            ind.className = 'enemy-turn';
                            ind.innerHTML = '<i class="fa-solid fa-satellite-dish fa-spin"></i> ' + t('sim.waiting_commander');
                        }
                        return;
                    }
                    
                    // Game finished by opponent
                    if (data.room_status === 'finished') {
                        clearInterval(mpSyncInterval);
                        if (data.game_data && data.game_data !== '{}' && data.game_version > _lastGameVersion) {
                            _lastGameVersion = data.game_version;
                            let incomingData = JSON.parse(data.game_data);
                            units = incomingData.units || [];
                            if (incomingData.aiGold_for_opponent !== undefined) aiGold = incomingData.aiGold_for_opponent;
                            if (incomingData.playerGold_for_opponent !== undefined) playerGold = incomingData.playerGold_for_opponent;
                        }
                        draw();
                        if (!_gameOverProcessed) {
                            _gameOverProcessed = true;
                            if (!checkDeaths()) {
                                gameState = 'finished';
                                alert(t('sim.match_finished'));
                            }
                        }
                        return;
                    }
                    
                    // It's my turn AND there's new data from server
                    if (data.current_turn === GAME_ROLE && data.game_version > _lastGameVersion) {
                        _lastGameVersion = data.game_version;
                        _waitingForTurnAck = false;
                        isMyTurnMp = true;
                        turn = 'player';
                        updateTurnIndicator();
                        
                        if (data.game_data && data.game_data !== '{}') {
                            let incomingData = JSON.parse(data.game_data);
                            units = incomingData.units || [];
                            if (incomingData.aiGold_for_opponent !== undefined) aiGold = incomingData.aiGold_for_opponent;
                            if (incomingData.playerGold_for_opponent !== undefined) playerGold = incomingData.playerGold_for_opponent;
                        }
                        
                        units.forEach(u => { if (u.type === 'player') { u.hasMoved = false; u.hasAttacked = false; }});
                        
                        updateUI();
                        logMessage(t('sim.your_turn'), 'msg-sys');
                        draw();
                        if (!_gameOverProcessed) checkDeaths();
                    } else if (data.current_turn === GAME_ROLE && isMyTurnMp) {
                        // Already my turn, no new data — just refresh indicator
                        // This handles the case when guest joins and room switches from 'waiting' to 'playing'
                        updateTurnIndicator();
                    } else if (data.current_turn !== GAME_ROLE) {
                        // Not my turn — show waiting indicator
                        if (isMyTurnMp) {
                            isMyTurnMp = false;
                            turn = 'wait';
                            updateTurnIndicator();
                        }
                    }
                })
                .catch(e => console.error('Polling error:', e));
            }, 1500);
        }

        function draw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid squares
            for(let y=0; y<GRID_SIZE; y++) {
                for(let x=0; x<GRID_SIZE; x++) {
                    ctx.fillStyle = (x+y)%2===0 ? COLORS.grid1 : COLORS.grid2;
                    ctx.fillRect(x*CELL_SIZE, y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    
                    // Add subtle tactical grid lines
                    ctx.strokeStyle = COLORS.gridLine;
                    ctx.lineWidth = 0.5;
                    ctx.strokeRect(x*CELL_SIZE, y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
                }
            }
            
            // похуйй
            if (selectedUnit) {
                ctx.fillStyle = COLORS.highlightSelect;
                ctx.fillRect(selectedUnit.x*CELL_SIZE, selectedUnit.y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
                let mr = selectedUnit.moveRange;
                let ar = selectedUnit.attackRange;
                let maxR = Math.max(mr, ar);
                for(let dy=-maxR; dy<=maxR; dy++) {
                    for(let dx=-maxR; dx<=maxR; dx++) {
                        if (dx===0 && dy===0) continue;
                        let nx = selectedUnit.x + dx;
                        let ny = selectedUnit.y + dy;
                        if (nx>=0 && nx<GRID_SIZE && ny>=0 && ny<GRID_SIZE) {
                            let target = getUnitAt(nx, ny);
                            let dist = Math.max(Math.abs(dx), Math.abs(dy));
                            // похуи
                            if (!target && !selectedUnit.hasMoved && !selectedUnit.hasAttacked && dist <= mr) {
                                ctx.fillStyle = COLORS.highlightMove;
                                ctx.fillRect(nx*CELL_SIZE, ny*CELL_SIZE, CELL_SIZE, CELL_SIZE);
                            } else if (target && target.type === 'enemy' && !selectedUnit.hasAttacked && dist <= ar) {
                                ctx.fillStyle = COLORS.highlightAttack;
                                ctx.fillRect(nx*CELL_SIZE, ny*CELL_SIZE, CELL_SIZE, CELL_SIZE);
                            }
                        }
                    }
                }
            }
            
            units.forEach(u => {
                let px = u.x * CELL_SIZE;
                let py = u.y * CELL_SIZE;
                let typeData = UNIT_TYPES[u.uClass];
                
                let ownerColor = u.type === 'player' ? '#00FF00' : '#F44336';
                // поохуй
                if (u.uClass === 'hq') ownerColor = u.type === 'player' ? '#1976D2' : '#C62828';
                
                ctx.save();
                ctx.translate(px + 6, py + 6); // Отступ
                ctx.scale((CELL_SIZE-12)/24, (CELL_SIZE-12)/24); 
                let p2d = new Path2D(typeData.path);
                
                ctx.fillStyle = ownerColor;
                ctx.fill(p2d);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.stroke(p2d);
                ctx.restore();
                
                if (u.type === 'player' && u.hasAttacked && gameState === 'playing' && turn === 'player' && u.uClass !== 'hq') {
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
                } else if (u.type === 'player' && u.hasMoved && gameState === 'playing' && turn === 'player' && u.uClass !== 'hq') {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
                }

                let hpRatio = u.hp / u.maxHp;
                ctx.fillStyle = '#111';
                ctx.fillRect(px + 4, py + CELL_SIZE - 8, CELL_SIZE - 8, 4);
                ctx.fillStyle = hpRatio > 0.5 ? '#4CAF50' : hpRatio > 0.25 ? '#FFEB3B' : '#F44336';
                ctx.fillRect(px + 4, py + CELL_SIZE - 8, (CELL_SIZE - 8) * hpRatio, 4);
            });

            if (gameState === 'won') {
                drawTextOverlay(t('sim.victory_overlay'), "#00FF00");
            } else if (gameState === 'lost') {
                drawTextOverlay(t('sim.defeat_overlay'), "#f44336");
            }
            console.log("Draw cycle complete. Units:", units.length);
        }

        function drawTextOverlay(text, color) {
            ctx.fillStyle = 'rgba(0,0,0,0.65)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = color;
            ctx.font = 'bold 44px Tahoma';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = "rgba(0,0,0,0.8)";
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.shadowBlur = 4;
            ctx.fillText(text, canvas.width/2, canvas.height/2);
            ctx.shadowColor = "transparent";
        }
        // Re-render all text when language changes
        window.addEventListener('zeta-lang-change', () => {
            updateUI();
            updateTurnIndicator();
            // Re-translate static button labels
            const lblProg = document.getElementById('lbl-level-progression');
            if (lblProg) lblProg.textContent = zetaGetLang() === 'ru' ? 'ПРОГРЕСС УРОВНЯ' : 'LEVEL PROGRESSION';
        });
    </script>

    <script src="{% static 'js/i18n.js' %}?v=1.0.7"></script>
